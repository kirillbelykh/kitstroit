services:
  db:
    network_mode: host
    command: ["postgres", "-c", "listen_addresses=127.0.0.1"]

  backend:
    network_mode: host
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@127.0.0.1:5432/${POSTGRES_DB}
    command: >-
      sh -c "uv run --no-sync alembic upgrade head &&
      exec uv run --no-sync uvicorn app.main:app --host 127.0.0.1 --port 8000"

  frontend:
    network_mode: host
    volumes:
      - ./infra/nginx-host.conf:/etc/nginx/conf.d/default.conf:ro

  caddy:
    network_mode: host
    ports: !reset []
    volumes:
      - ./infra/Caddyfile.host:/etc/caddy/Caddyfile:ro

